<!DOCTYPE html>
<html>
<head>
    <title>FoldBack: Massive Multiplayer</title>
    <style>
        body { background: #222; color: #fff; font-family: monospace; text-align: center; overflow: hidden; }
        canvas { border: 4px solid #444; background: #000; }
        .stats { color: #aaa; padding: 10px; }
        .autoplay-indicator { color: #2ecc71; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>FoldBack: 50+ Player Lisp Server</h1>
    <div id="autoplayMode" class="autoplay-indicator" style="display:none;">AUTOPLAY ACTIVE</div>
    <div class="stats" id="netStats">Connecting...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let TILE_SIZE = 20; 
        let pc, dc;
        let lastMsgTime = 0;
        
        const urlParams = new URLSearchParams(window.location.search);
        const isAutoplay = urlParams.get('autoplay') === '1';
        if (isAutoplay) document.getElementById('autoplayMode').style.display = 'block';

        let localState = { tick: 0, players: {}, bombs: [], explosions: [], bots: [], level: [] };
        const keys = new Set();
        const colors = ["#3498db", "#e74c3c", "#2ecc71", "#f1c40f", "#9b59b6", "#1abc9c", "#e67e22"];

        async function connect() {
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            dc = pc.createDataChannel("foldback", { ordered: false, maxRetransmits: 0 });

            dc.onmessage = (e) => {
                lastMsgTime = Date.now();
                try {
                    const delta = JSON.parse(e.data);
                    applyDelta(delta);
                    render();
                    const mapW = localState.level.length > 0 ? localState.level[0].length : 0;
                    const mapH = localState.level.length;
                    document.getElementById('netStats').innerText = `Tick: ${delta.t} | Map: ${mapW}x${mapH} | Players: ${Object.keys(localState.players).length}`;
                } catch (err) {
                    console.error("Error parsing/applying delta:", err, e.data);
                }
            };

            dc.onopen = () => {
                console.log("DataChannel Open!");
                document.getElementById('netStats').innerText = "Connected!";
                dc.send("()"); 

                if (isAutoplay) {
                    setInterval(() => {
                        if (dc.readyState !== "open") return;
                        const actions = [
                            {dx: 0.1, dy: 0}, {dx: -0.1, dy: 0},
                            {dx: 0, dy: 0.1}, {dx: 0, dy: -0.1},
                            {dx: 0, dy: 0, drop: "t"}, {dx: 0, dy: 0}
                        ];
                        const act = actions[Math.floor(Math.random() * actions.length)];
                        dc.send(`(:dx ${act.dx || 0} :dy ${act.dy || 0} :drop-bomb ${act.drop || "nil"})`);
                    }, 200);
                }

                function sendInput() {
                    if (dc.readyState === "open" && !isAutoplay) {
                        let dx = 0, dy = 0, drop = "nil";
                        if (keys.has('w')) dy = -0.1;
                        if (keys.has('s')) dy = 0.1;
                        if (keys.has('a')) dx = -0.1;
                        if (keys.has('d')) dx = 0.1;
                        if (keys.has(' ')) { drop = "t"; keys.delete(' '); } 
                        
                        if (dx !== 0 || dy !== 0 || drop === "t") {
                            dc.send(`(:dx ${dx} :dy ${dy} :drop-bomb ${drop})`);
                        }
                    }
                    setTimeout(sendInput, 16); 
                }
                sendInput();
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            await new Promise(resolve => {
                if (pc.iceGatheringState === 'complete') {
                    resolve();
                } else {
                    function checkState() {
                        if (pc.iceGatheringState === 'complete') {
                            pc.removeEventListener('icegatheringstatechange', checkState);
                            resolve();
                        }
                    }
                    pc.addEventListener('icegatheringstatechange', checkState);
                }
            });

            const response = await fetch('/offer', {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(pc.localDescription)
            });
            const answer = await response.json();
            await pc.setRemoteDescription(answer);
        }

        function applyDelta(delta) {
            localState.tick = delta.t;
            if (delta.p) {
                delta.p.forEach(dp => { 
                    localState.players[dp.id] = dp; 
                });
            }
            if (delta.l) {
                localState.level = delta.l;
                canvas.width = localState.level[0].length * TILE_SIZE;
                canvas.height = localState.level.length * TILE_SIZE;
            }
            localState.bombs = delta.b || [];
            localState.explosions = delta.e || [];
            localState.bots = delta.bots || [];
        }

        window.addEventListener('keydown', (e) => { keys.add(e.key.toLowerCase()); if(e.code === 'Space') keys.add(' '); });
        window.addEventListener('keyup', (e) => { keys.delete(e.key.toLowerCase()); if(e.code === 'Space') keys.delete(' '); });

        function render() {
            if (!localState.level || localState.level.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Draw Level
            localState.level.forEach((row, y) => {
                row.forEach((tile, x) => {
                    if (tile === 1) {
                        ctx.fillStyle = "#444"; // Hard Wall
                        ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (tile === 2) {
                        ctx.fillStyle = "#8b4513"; // Crate (Brown)
                        ctx.fillRect(x * TILE_SIZE + 1, y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                        ctx.strokeStyle = "#5d2e0d";
                        ctx.strokeRect(x * TILE_SIZE + 3, y * TILE_SIZE + 3, TILE_SIZE - 6, TILE_SIZE - 6);
                    }
                });
            });

            // 2. Draw Explosions (Fire)
            ctx.fillStyle = "rgba(255, 69, 0, 0.7)";
            localState.explosions.forEach(exp => {
                ctx.fillRect(exp.x * TILE_SIZE, exp.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            });

            // 3. Draw Bombs
            localState.bombs.forEach(bomb => {
                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.arc(bomb.x * TILE_SIZE + TILE_SIZE/2, bomb.y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2.5, 0, Math.PI*2);
                ctx.fill();
                // Timer indicator
                ctx.fillStyle = "#fff";
                ctx.fillRect(bomb.x * TILE_SIZE + 4, bomb.y * TILE_SIZE + 4, (bomb.tm/180)*(TILE_SIZE-8), 2);
            });

            // 4. Draw Bots
            ctx.fillStyle = "#ff00ff"; // Pink Bots
            localState.bots.forEach(bot => {
                ctx.fillRect(bot.x * TILE_SIZE + 4, bot.y * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                ctx.fillStyle = "#000";
                ctx.fillRect(bot.x * TILE_SIZE + 6, bot.y * TILE_SIZE + 6, 2, 2);
                ctx.fillRect(bot.x * TILE_SIZE + 12, bot.y * TILE_SIZE + 6, 2, 2);
                ctx.fillStyle = "#ff00ff";
            });

            // 5. Draw Players
            Object.values(localState.players).forEach(p => {
                const isDead = p.h <= 0;
                ctx.fillStyle = isDead ? "#555" : colors[p.id % colors.length];
                ctx.fillRect(p.x * TILE_SIZE + 2, p.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                if (isDead) {
                    ctx.fillStyle = "#fff";
                    ctx.font = "10px Arial";
                    ctx.fillText("X", p.x * TILE_SIZE + 6, p.y * TILE_SIZE + 14);
                }
            });
        }

        connect();
    </script>
</body>
</html>
