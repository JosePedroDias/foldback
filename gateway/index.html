<!DOCTYPE html>
<html>
<head>
    <title>FoldBack: Massive Multiplayer</title>
    <style>
        body { background: #222; color: #fff; font-family: monospace; text-align: center; overflow: hidden; }
        canvas { border: 4px solid #444; background: #000; }
        .stats { color: #aaa; padding: 10px; }
        .autoplay-indicator { color: #2ecc71; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>FoldBack: 50+ Player Lisp Server</h1>
    <div id="autoplayMode" class="autoplay-indicator" style="display:none;">AUTOPLAY ACTIVE</div>
    <div class="stats" id="netStats">Connecting...</div>
    <canvas id="gameCanvas"></canvas>

    <script src="foldback-engine.js"></script>
    <script src="bomberman-logic.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 20; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const isAutoplay = urlParams.get('autoplay') === '1';
        const protocol = urlParams.get('protocol') || 'websockets';
        if (isAutoplay) document.getElementById('autoplayMode').style.display = 'block';

        const world = new FoldBackWorld();
        const keys = new Set();
        let connection = { send: (data) => {}, isOpen: () => false };

        function onMessage(data) {
            const res = processServerMessage(world, data, bombermanUpdate, bombermanApplyDelta, bombermanSync);
            
            if (res.type === 'welcome') {
                console.log("Joined as Player ID:", res.id);
            }
            
            if (res.tick !== undefined) {
                const ahead = world.currentTick - res.tick;
                document.getElementById('netStats').innerText = 
                    `[${protocol.toUpperCase()}] ID: ${world.myPlayerId} | Tick: ${res.tick} (+${ahead}) | Rollbacks: ${world.totalRollbacks} | Players: ${Object.keys(world.localState.players).length}`;
            }
            bombermanRender(ctx, canvas, world.localState, TILE_SIZE);
        }

        function sendInput() {
            if (connection.isOpen() && !isAutoplay && world.myPlayerId !== null) {
                let dx = 0, dy = 0, drop = "nil";
                if (keys.has('w')) dy = -0.1;
                if (keys.has('s')) dy = 0.1;
                if (keys.has('a')) dx = -0.1;
                if (keys.has('d')) dx = 0.1;
                if (keys.has(' ')) { drop = "t"; keys.delete(' '); } 
                
                const nextTick = world.currentTick + 1;
                const inputsForTick = {};
                if (dx !== 0 || dy !== 0 || drop === "t") {
                    const input = { dx, dy, 'drop-bomb': drop === "t", t: nextTick };
                    connection.send(`(:dx ${dx} :dy ${dy} :drop-bomb ${drop} :t ${nextTick})`);
                    inputsForTick[world.myPlayerId] = input;
                    if (!world.inputBuffer.has(nextTick)) world.inputBuffer.set(nextTick, {});
                    world.inputBuffer.get(nextTick)[world.myPlayerId] = input;
                }
                
                world.localState = bombermanUpdate(world.localState, inputsForTick);
                world.currentTick = nextTick;
                world.history.set(nextTick, JSON.parse(JSON.stringify(world.localState)));
            }
            setTimeout(sendInput, 16); 
        }

        function onOpen() {
            console.log(`${protocol} Open!`);
            document.getElementById('netStats').innerText = "Connected! Waiting for ID...";
            connection.send("()"); 
            sendInput();
        }

        async function connectWS() {
            const ws = new WebSocket(`ws://${window.location.host}/ws`);
            ws.onopen = onOpen;
            ws.onmessage = (e) => onMessage(e.data);
            connection = { send: (data) => ws.send(data), isOpen: () => ws.readyState === WebSocket.OPEN };
        }

        async function connectWebRTC() {
            const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            const dc = pc.createDataChannel("foldback", { ordered: false, maxRetransmits: 0 });
            dc.onopen = onOpen;
            dc.onmessage = (e) => onMessage(e.data);
            connection = { send: (data) => dc.send(data), isOpen: () => dc.readyState === "open" };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await new Promise(resolve => {
                if (pc.iceGatheringState === 'complete') resolve();
                else pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') resolve(); };
            });
            const response = await fetch('/offer', { method: 'POST', body: JSON.stringify(pc.localDescription) });
            const answer = await response.json();
            await pc.setRemoteDescription(answer);
        }

        window.addEventListener('keydown', (e) => { keys.add(e.key.toLowerCase()); if(e.code === 'Space') keys.add(' '); });
        window.addEventListener('keyup', (e) => { keys.delete(e.key.toLowerCase()); if(e.code === 'Space') keys.delete(' '); });

        if (protocol === 'webrtc') connectWebRTC();
        else connectWS();
    </script>
</body>
</html>
