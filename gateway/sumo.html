<!DOCTYPE html>
<html>
<head>
    <title>FoldBack: Sumo Push</title>
    <style>
        body { background: #222; color: #fff; font-family: monospace; text-align: center; overflow: hidden; }
        canvas { border: 4px solid #444; background: #000; }
        .stats { color: #aaa; padding: 10px; }
    </style>
</head>
<body>
    <h1>FoldBack: Sumo Push</h1>
    <div class="stats" id="netStats">Connecting...</div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script src="foldback-engine.js"></script>
    <script src="sumo-logic.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 20; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const protocol = urlParams.get('protocol') || 'websockets';

        const world = new FoldBackWorld("sumo");
        window.world = world; // Expose for testing
        const keys = new Set();
        let connection = { send: (data) => {}, isOpen: () => false };

        function onMessage(data) {
            const res = processServerMessage(world, data, sumoUpdate, sumoApplyDelta, sumoSync);
            
            if (res.type === 'abort') {
                alert("Game ID Mismatch! This server is running a different game.");
                return;
            }
            if (res.type === 'welcome') {
                console.log("Joined as Player ID:", res.id);
            }
            
            if (res.tick !== undefined) {
                const ahead = world.currentTick - res.tick;
                document.getElementById('netStats').innerText = 
                    `[${protocol.toUpperCase()}] ID: ${world.myPlayerId} | Tick: ${res.tick} (+${ahead}/${world.maxLead}) | RTT: ${world.rtt}ms | Rollbacks: ${world.totalRollbacks} | Players: ${Object.keys(world.localState.players).length}`;
            }
        }

        // --- Linear Interpolation Logic ---
        const INTERP_DELAY_TICKS = 2; // Render 2 ticks behind server for remote entities

        function getInterpolatedState() {
            if (world.myPlayerId === null) return world.localState;

            // Target tick to render
            const serverTick = world.authoritativeState.tick;
            const targetTick = serverTick - INTERP_DELAY_TICKS;
            
            const stateA = world.history.get(targetTick);
            const stateB = world.history.get(targetTick + 1);

            if (!stateA || !stateB) return world.localState;

            // For now, we'll just return stateA or a simple blend
            // In a real impl, you'd use fractional sub-tick time, 
            // but even 1-tick discrete interp is better than raw packets.
            const interpState = JSON.parse(JSON.stringify(stateA));
            
            for (let id in stateB.players) {
                if (id == world.myPlayerId) {
                    // LOCAL PLAYER: Use latest predicted state (NO LAG)
                    interpState.players[id] = world.localState.players[id];
                    continue;
                }

                // REMOTE PLAYERS: Interpolate between A and B
                const pA = stateA.players[id];
                const pB = stateB.players[id];
                if (pA && pB) {
                    interpState.players[id] = {
                        ...pB,
                        x: pA.x + (pB.x - pA.x) * 0.5, // Simple midpoint for POC
                        y: pA.y + (pB.y - pA.y) * 0.5
                    };
                }
            }
            return interpState;
        }

        function renderLoop() {
            const stateToRender = getInterpolatedState();
            window.renderedState = stateToRender; // Expose for testing
            sumoRender(ctx, canvas, stateToRender, TILE_SIZE);
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop);

        function sendInput() {
            if (connection.isOpen() && world.myPlayerId !== null) {
                const serverTick = world.authoritativeState.tick;
                const lead = world.currentTick - serverTick;

                if (lead < world.maxLead) {
                    let dx = 0, dy = 0;
                    if (keys.has('w') || keys.has('arrowup')) dy = -1.0;
                    if (keys.has('s') || keys.has('arrowdown')) dy = 1.0;
                    if (keys.has('a') || keys.has('arrowleft')) dx = -1.0;
                    if (keys.has('d') || keys.has('arrowright')) dx = 1.0;
                    
                    const nextTick = world.currentTick + 1;
                    const inputsForTick = {};
                    if (dx !== 0 || dy !== 0) {
                        const input = { dx, dy, t: nextTick };
                        connection.send(`(:dx ${dx} :dy ${dy} :t ${nextTick})`);
                        inputsForTick[world.myPlayerId] = input;
                        if (!world.inputBuffer.has(nextTick)) world.inputBuffer.set(nextTick, {});
                        world.inputBuffer.get(nextTick)[world.myPlayerId] = input;
                    }
                    
                    world.localState = sumoUpdate(world.localState, inputsForTick);
                    world.currentTick = nextTick;
                    world.history.set(nextTick, JSON.parse(JSON.stringify(world.localState)));
                }

                const now = Date.now();
                if (now - world.lastPingTime > 500) {
                    const pingId = now;
                    world.pings.set(pingId, now);
                    connection.send(`(:ping ${pingId})`);
                    world.lastPingTime = now;
                }
            }
            setTimeout(sendInput, 16); 
        }

        function onOpen() {
            console.log(`${protocol} Open!`);
            document.getElementById('netStats').innerText = "Connected! Waiting for ID...";
            connection.send("()"); 
            sendInput();
        }

        async function connectWS() {
            const ws = new WebSocket(`ws://${window.location.host}/ws`);
            ws.onopen = onOpen;
            ws.onmessage = (e) => onMessage(e.data);
            connection = { send: (data) => ws.send(data), isOpen: () => ws.readyState === WebSocket.OPEN };
        }

        async function connectWebRTC() {
            const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            const dc = pc.createDataChannel("foldback", { ordered: false, maxRetransmits: 0 });
            dc.onopen = onOpen;
            dc.onmessage = (e) => onMessage(e.data);
            connection = { send: (data) => dc.send(data), isOpen: () => dc.readyState === "open" };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await new Promise(resolve => {
                if (pc.iceGatheringState === 'complete') resolve();
                else pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') resolve(); };
            });
            const response = await fetch('/offer', { method: 'POST', body: JSON.stringify(pc.localDescription) });
            const answer = await response.json();
            await pc.setRemoteDescription(answer);
        }

        window.addEventListener('keydown', (e) => { keys.add(e.key.toLowerCase()); });
        window.addEventListener('keyup', (e) => { keys.delete(e.key.toLowerCase()); });

        if (protocol === 'webrtc') connectWebRTC();
        else connectWS();
    </script>
</body>
</html>
